
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTE Daily Zen Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #1d1616; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .checked { opacity: 0.5; text-decoration: line-through; }
        .gradient-text { background: linear-gradient(90deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-btn { flex: 1; padding: 0.5rem 0; border-radius: 0.75rem; font-weight: 700; font-size: 0.875rem; transition: all 0.2s; }
        .tab-inactive { color: #94a3b8; background: transparent; }
        .tab-daily  { background: linear-gradient(90deg, #7c3aed, #0891b2); color: white; }
        .tab-weekly { background: linear-gradient(90deg, #059669, #0891b2); color: white; }
        .tab-fixed  { background: linear-gradient(90deg, #b45309, #d97706); color: white; }
        #bg-image-overlay { position:absolute; inset:0; transition: opacity 0.6s ease; }
        .bg-img-layer { position:absolute; inset:0; background-image:url('https://nte.perfectworld.com/public/images/cover260411/box1.jpg'); background-size:cover; background-position:right center; opacity:0.45; }
        .bg-gradient-layer { position:absolute; inset:0; background:linear-gradient(to right, #0f1115 20%, rgba(15,17,21,0.92) 45%, rgba(15,17,21,0.65) 68%, rgba(15,17,21,0.15) 100%); }
        #bg-toggle-btn.bg-on { color: #a78bfa; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- 배경 효과 -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
        <!-- 배경 이미지 (토글 가능) -->
        <div id="bg-image-overlay">
            <div class="bg-img-layer"></div>
            <div class="bg-gradient-layer"></div>
        </div>
        <div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-purple-600/10 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-cyan-600/10 blur-[100px] rounded-full"></div>
    </div>

    <div class="max-w-xl mx-auto">
        <!-- 헤더 -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black gradient-text">NTE ZEN TRACKER</h1>
                <p id="current-date" class="text-slate-500 text-sm mt-1"></p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleBg()" id="bg-toggle-btn" class="text-slate-400 hover:text-white transition-colors" title="배경 이미지 ON/OFF">
                    <i class="fa-solid fa-image text-xl"></i>
                </button>
                <button onclick="resetTasks()" class="text-slate-400 hover:text-white transition-colors" title="현재 탭 초기화">
                    <i class="fa-solid fa-rotate-right text-xl"></i>
                </button>
            </div>
        </header>

        <!-- 탭 네비게이션 -->
        <div class="glass flex rounded-2xl p-1 mb-6 gap-1">
            <button id="tab-daily"  onclick="switchTab('daily')"  class="tab-btn tab-daily">
                <i class="fa-solid fa-sun mr-1"></i> 일간
            </button>
            <button id="tab-weekly" onclick="switchTab('weekly')" class="tab-btn tab-inactive">
                <i class="fa-solid fa-calendar-week mr-1"></i> 주간
            </button>
            <button id="tab-fixed"  onclick="switchTab('fixed')"  class="tab-btn tab-inactive">
                <i class="fa-solid fa-thumbtack mr-1"></i> 고정
            </button>
        </div>

        <!-- 프로그레스 카드 -->
        <div class="glass rounded-3xl p-6 mb-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span id="progress-percent" class="text-4xl font-bold text-white">0%</span>
                    <p id="progress-label" class="text-slate-400 text-sm">오늘의 달성도</p>
                </div>
                <div class="text-right">
                    <span id="task-count" class="text-lg font-semibold text-purple-400">0 / 0</span>
                    <p id="reset-info" class="text-slate-500 text-xs mt-1"></p>
                </div>
            </div>
            <div class="h-2.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="progress-fill" class="progress-bar h-full bg-gradient-to-r from-purple-500 to-cyan-500 w-0"></div>
            </div>
        </div>

        <!-- 리스트 섹션 -->
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 id="section-title" class="font-bold flex items-center gap-2 text-slate-200">
                <i class="fa-solid fa-sun text-purple-400"></i> 일간 체크리스트
            </h2>
            <button onclick="toggleModal(true)" class="text-sm font-medium text-purple-400 hover:text-purple-300">
                <i class="fa-solid fa-plus"></i> 추가
            </button>
        </div>

        <div id="task-list" class="space-y-3"></div>
    </div>

    <!-- 축하 토스트 -->
    <div id="celebration-toast" style="position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(1rem); opacity:0; transition: opacity 0.4s ease, transform 0.4s ease; pointer-events:none; z-index:100;" class="bg-gradient-to-r from-purple-600 to-cyan-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-lg whitespace-nowrap">
        🎉 이상관리국 임무 완료!
    </div>

    <!-- 추가 모달 -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="glass w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">새로운 일과 추가</h3>
            <input type="text" id="new-task-input" placeholder="어떤 일을 추가할까? 코코!"
                onkeydown="if(event.key==='Enter') addTask()"
                class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4">
            <p class="text-slate-500 text-xs mb-2 font-medium">타입 선택</p>
            <div class="flex gap-2 mb-6">
                <button id="type-daily"  onclick="selectType('daily')"  class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-purple-600 text-white">
                    <i class="fa-solid fa-sun mr-1"></i> 일간
                </button>
                <button id="type-weekly" onclick="selectType('weekly')" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-slate-700 text-slate-300">
                    <i class="fa-solid fa-calendar-week mr-1"></i> 주간
                </button>
                <button id="type-fixed"  onclick="selectType('fixed')"  class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-slate-700 text-slate-300">
                    <i class="fa-solid fa-thumbtack mr-1"></i> 고정
                </button>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleModal(false)" class="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl font-bold">취소</button>
                <button onclick="addTask()" class="flex-1 py-3 bg-gradient-to-r from-purple-600 to-cyan-600 text-white rounded-xl font-bold">추가하기</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'nte_tasks_v2';
        let tasks = [];
        let currentTab = 'daily';
        let bgVisible = localStorage.getItem('nte_bg') !== 'off';

        function toggleBg() {
            bgVisible = !bgVisible;
            document.getElementById('bg-image-overlay').style.opacity = bgVisible ? '1' : '0';
            document.getElementById('bg-toggle-btn').classList.toggle('bg-on', bgVisible);
            localStorage.setItem('nte_bg', bgVisible ? 'on' : 'off');
        }
        let selectedType = 'daily';
        let lastDailyReset = '';
        let lastWeeklyReset = '';
        let completionShown = { daily: false, weekly: false, fixed: false };
        const clickTimers = {};

        const defaultTasks = [
            { id: 1, name: '나쿠펜다 소원 연못', done: false, type: 'daily' },
            { id: 2, name: '치즈로 4만 폰즈 먹기', done: false, type: 'daily' },
            { id: 3, name: '타기도 삭제 메일 보내기', done: true, type: 'fixed' }
        ];

        // ISO 주 키 (월요일 기준)
        function getWeekKey() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
        }

        function init() {
            // 배경 이미지 초기 상태 적용
            document.getElementById('bg-image-overlay').style.opacity = bgVisible ? '1' : '0';
            document.getElementById('bg-toggle-btn').classList.toggle('bg-on', bgVisible);

            const saved = localStorage.getItem(STORAGE_KEY);
            const today = new Date().toLocaleDateString('ko-KR');
            const weekKey = getWeekKey();
            document.getElementById('current-date').innerText = today;

            if (saved) {
                const data = JSON.parse(saved);
                tasks = data.tasks || [];
                lastDailyReset  = data.lastDailyReset  || today;
                lastWeeklyReset = data.lastWeeklyReset || weekKey;

                // 일간 자동 리셋 (날짜 변경 시)
                if (lastDailyReset !== today) {
                    tasks = tasks.map(t => t.type === 'daily' ? { ...t, done: false } : t);
                    lastDailyReset = today;
                }
                // 주간 자동 리셋 (주 변경 시 — 매주 월요일)
                if (lastWeeklyReset !== weekKey) {
                    tasks = tasks.map(t => t.type === 'weekly' ? { ...t, done: false } : t);
                    lastWeeklyReset = weekKey;
                }
            } else {
                tasks = [...defaultTasks];
                lastDailyReset  = today;
                lastWeeklyReset = weekKey;
            }
            // 초기 로드 시 이미 완료 상태면 축하 효과 표시 안 함
            ['daily', 'weekly', 'fixed'].forEach(tab => {
                const tabTasks = tasks.filter(t => t.type === tab);
                completionShown[tab] = tabTasks.length > 0 && tabTasks.every(t => t.done);
            });
            saveData();
            render();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                tasks,
                lastDailyReset,
                lastWeeklyReset
            }));
        }

        function switchTab(tab) {
            currentTab = tab;
            const activeClass = { daily: 'tab-daily', weekly: 'tab-weekly', fixed: 'tab-fixed' };
            ['daily', 'weekly', 'fixed'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = `tab-btn ${t === tab ? activeClass[t] : 'tab-inactive'}`;
            });
            const titles  = { daily: '일간 체크리스트', weekly: '주간 체크리스트', fixed: '고정 체크리스트' };
            const labels  = { daily: '오늘의 달성도',   weekly: '이번 주 달성도',  fixed: '고정 달성도' };
            const icons   = { daily: 'fa-sun text-purple-400', weekly: 'fa-calendar-week text-emerald-400', fixed: 'fa-thumbtack text-amber-400' };
            const barGrad = {
                daily:  'bg-gradient-to-r from-purple-500 to-cyan-500',
                weekly: 'bg-gradient-to-r from-emerald-500 to-cyan-500',
                fixed:  'bg-gradient-to-r from-amber-500 to-orange-500'
            };
            document.getElementById('section-title').innerHTML =
                `<i class="fa-solid ${icons[tab]}"></i> ${titles[tab]}`;
            document.getElementById('progress-label').innerText = labels[tab];
            const fill = document.getElementById('progress-fill');
            fill.className = `progress-bar h-full w-0 ${barGrad[tab]}`;
            render();
        }

        function selectType(type) {
            selectedType = type;
            const activeColors = { daily: 'bg-purple-600 text-white', weekly: 'bg-emerald-600 text-white', fixed: 'bg-amber-600 text-white' };
            ['daily', 'weekly', 'fixed'].forEach(t => {
                const btn = document.getElementById(`type-${t}`);
                btn.className = `flex-1 py-2 rounded-xl text-sm font-bold transition-all ${t === type ? activeColors[t] : 'bg-slate-700 text-slate-300'}`;
            });
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
            saveData();
            render();
        }

        function addTask() {
            const input = document.getElementById('new-task-input');
            if (!input.value.trim()) return;
            tasks.push({ id: Date.now(), name: input.value.trim(), done: false, type: selectedType });
            input.value = '';
            toggleModal(false);
            saveData();
            switchTab(selectedType);
        }

        function deleteTask(id, event) {
            event.stopPropagation();
            if (!confirm('이 항목을 삭제할까요?')) return;
            tasks = tasks.filter(t => t.id !== id);
            saveData();
            render();
        }

        function resetTasks() {
            const labels = { daily: '오늘 일간', weekly: '이번 주 주간', fixed: '고정' };
            if (confirm(`${labels[currentTab]} 항목을 모두 미완료 상태로 초기화할까요?`)) {
                tasks = tasks.map(t => t.type === currentTab ? { ...t, done: false } : t);
                saveData();
                render();
            }
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
            if (show) {
                selectType(currentTab);
                setTimeout(() => document.getElementById('new-task-input').focus(), 50);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const filtered = tasks.filter(t => t.type === currentTab)
                .sort((a, b) => a.done === b.done ? 0 : a.done ? 1 : -1);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center text-slate-500 py-12">
                        <i class="fa-solid fa-inbox text-3xl mb-3 block opacity-40"></i>
                        <p>아직 항목이 없습니다</p>
                        <p class="text-xs mt-1 opacity-60">+ 추가 버튼으로 새 항목을 만들어보세요</p>
                    </div>`;
            } else {
                const hoverColors = { daily: 'hover:border-purple-500/50', weekly: 'hover:border-emerald-500/50', fixed: 'hover:border-amber-500/50' };
                const checkColors = { daily: 'text-cyan-400', weekly: 'text-emerald-400', fixed: 'text-amber-400' };
                let doneCount = 0;
                filtered.forEach(task => {
                    if (task.done) doneCount++;
                    const item = document.createElement('div');
                    item.className = `glass flex items-center justify-between p-4 rounded-2xl cursor-pointer ${hoverColors[task.type]} transition-all ${task.done ? 'checked' : ''}`;
                    item.dataset.id = task.id;
                    item.onclick = () => handleTaskClick(task.id);
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <i class="${task.done ? `fa-solid fa-circle-check ${checkColors[task.type]}` : 'fa-regular fa-circle'} text-xl"></i>
                            <span class="font-medium task-name cursor-text" title="더블클릭으로 편집">${escapeHtml(task.name)}</span>
                        </div>
                        <button onclick="deleteTask(${task.id}, event)" class="text-slate-500 hover:text-red-400 p-1 transition-colors">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    list.appendChild(item);
                });

                const total = filtered.length;
                const percent = Math.round((doneCount / total) * 100);
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-fill').style.width = `${percent}%`;
                document.getElementById('task-count').innerText = `${doneCount} / ${total}`;
                const resetTexts = { daily: '매일 자동 초기화', weekly: '매주 월요일 자동 초기화', fixed: '수동 초기화만 가능' };
                document.getElementById('reset-info').innerText = resetTexts[currentTab];
                if (percent === 100 && total > 0) {
                    if (!completionShown[currentTab]) {
                        completionShown[currentTab] = true;
                        showCelebration();
                    }
                } else {
                    completionShown[currentTab] = false;
                }
                return;
            }

            document.getElementById('progress-percent').innerText = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('task-count').innerText = '0 / 0';
            const resetTexts = { daily: '매일 자동 초기화', weekly: '매주 월요일 자동 초기화', fixed: '수동 초기화만 가능' };
            document.getElementById('reset-info').innerText = resetTexts[currentTab];
        }

        function handleTaskClick(id) {
            if (clickTimers[id]) {
                clearTimeout(clickTimers[id]);
                delete clickTimers[id];
                startEdit(id);
            } else {
                clickTimers[id] = setTimeout(() => {
                    delete clickTimers[id];
                    toggleTask(id);
                }, 250);
            }
        }

        function startEdit(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const item = Array.from(document.querySelectorAll('#task-list [data-id]'))
                .find(el => el.dataset.id == id);
            if (!item) return;
            const span = item.querySelector('.task-name');
            if (!span) return;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = task.name;
            input.className = 'bg-transparent outline-none border-b border-purple-400 text-white font-medium flex-1 min-w-0';
            item.onclick = null;
            span.replaceWith(input);
            input.focus();
            input.select();

            let saved = false;
            function save() {
                if (saved) return;
                saved = true;
                const newName = input.value.trim();
                if (newName && newName !== task.name) {
                    tasks = tasks.map(t => t.id === id ? { ...t, name: newName } : t);
                    saveData();
                }
                render();
            }
            function cancel() {
                if (saved) return;
                saved = true;
                render();
            }
            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); input.removeEventListener('blur', save); save(); }
                if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', save); cancel(); }
            });
        }

        function showCelebration() {
            const toast = document.getElementById('celebration-toast');
            clearTimeout(toast._hideTimer);
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast._hideTimer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(1rem)';
            }, 2500);
        }

        init();
    </script>
</body>
</html>
