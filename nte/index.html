
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #1d1616; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .checked { opacity: 0.5; text-decoration: line-through; }
        .gradient-text { background: linear-gradient(90deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-btn { flex: 1; padding: 0.5rem 0; border-radius: 0.75rem; font-weight: 700; font-size: 0.875rem; transition: all 0.2s; }
        .tab-inactive { color: #94a3b8; background: transparent; }
        .tab-daily  { background: linear-gradient(90deg, #7c3aed, #0891b2); color: white; }
        .tab-weekly { background: linear-gradient(90deg, #059669, #0891b2); color: white; }
        .tab-fixed  { background: linear-gradient(90deg, #b45309, #d97706); color: white; }
        #bg-image-overlay { position:absolute; inset:0; transition: opacity 0.6s ease; }
        .bg-img-layer { position:absolute; inset:0; background-image:url('https://nte.perfectworld.com/public/images/cover260411/box1.jpg'); background-size:cover; background-position:right center; opacity:0.45; }
        .bg-gradient-layer { position:absolute; inset:0; background:linear-gradient(to right, #0f1115 20%, rgba(15,17,21,0.92) 45%, rgba(15,17,21,0.65) 68%, rgba(15,17,21,0.15) 100%); }
        #bg-toggle-btn.bg-on { color: #a78bfa; }
        .countdown-display { font-weight: 600; color: #60a5fa; }
        .countdown-alert { color: #ef4444; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <!-- 배경 효과 -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
        <!-- 배경 이미지 (토글 가능) -->
        <div id="bg-image-overlay">
            <div class="bg-img-layer"></div>
            <div class="bg-gradient-layer"></div>
        </div>
        <div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-purple-600/10 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-cyan-600/10 blur-[100px] rounded-full"></div>
    </div>

    <div class="max-w-xl mx-auto">
        <!-- 헤더 -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black gradient-text">Universal Task Tracker</h1>
                <p id="current-date" class="text-slate-500 text-sm mt-1"></p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="promptInstall()" id="install-btn" class="hidden text-slate-400 hover:text-white transition-colors" title="페이지 설치">
                    <i class="fa-solid fa-download text-xl"></i>
                </button>
                <button onclick="exportData()" class="text-slate-400 hover:text-white transition-colors" title="데이터 내보내기">
                    <i class="fa-solid fa-file-export text-xl"></i>
                </button>
                <button onclick="importData()" class="text-slate-400 hover:text-white transition-colors" title="데이터 가져오기">
                    <i class="fa-solid fa-file-import text-xl"></i>
                </button>
                <button onclick="toggleBg()" id="bg-toggle-btn" class="text-slate-400 hover:text-white transition-colors" title="배경 이미지 ON/OFF">
                    <i class="fa-solid fa-image text-xl"></i>
                </button>
                <button onclick="resetTasks()" class="text-slate-400 hover:text-white transition-colors" title="현재 탭 초기화">
                    <i class="fa-solid fa-rotate-right text-xl"></i>
                </button>
            </div>
        </header>

        <!-- 탭 네비게이션 -->
        <div class="glass flex rounded-2xl p-1 mb-6 gap-1">
            <button id="tab-daily"  onclick="switchTab('daily')"  class="tab-btn tab-daily">
                <i class="fa-solid fa-sun mr-1"></i> 일간
            </button>
            <button id="tab-weekly" onclick="switchTab('weekly')" class="tab-btn tab-inactive">
                <i class="fa-solid fa-calendar-week mr-1"></i> 주간
            </button>
            <button id="tab-fixed"  onclick="switchTab('fixed')"  class="tab-btn tab-inactive">
                <i class="fa-solid fa-thumbtack mr-1"></i> 고정
            </button>
        </div>

        <!-- 프로그레스 카드 -->
        <div class="glass rounded-3xl p-6 mb-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span id="progress-percent" class="text-4xl font-bold text-white">0%</span>
                    <p id="progress-label" class="text-slate-400 text-sm">오늘의 달성도</p>
                </div>
                <div class="text-right">
                    <span id="task-count" class="text-lg font-semibold text-purple-400">0 / 0</span>
                    <p id="reset-info" class="text-slate-500 text-xs mt-1"></p>
                </div>
            </div>
            <div class="h-2.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="progress-fill" class="progress-bar h-full bg-gradient-to-r from-purple-500 to-cyan-500 w-0"></div>
            </div>
        </div>

        <!-- 알람 설정 -->
        <div class="glass rounded-3xl p-6 mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div class="flex items-center gap-2 flex-wrap">
                    <label for="alarm-time" class="text-slate-400 text-sm">알람 시간</label>
                    <input id="alarm-time" type="time" class="bg-slate-800 border border-slate-700 rounded-2xl px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <button onclick="setAlarm()" class="px-4 py-2 rounded-2xl bg-purple-600 text-white hover:bg-purple-500 transition">등록</button>
                    <button onclick="cancelAlarm()" class="px-4 py-2 rounded-2xl bg-slate-700 text-slate-200 hover:bg-slate-600 transition">취소</button>
                </div>
                <div id="alarm-status" class="text-slate-400 text-sm">알람이 설정되지 않았습니다.</div>
            </div>
        </div>

        <input id="import-file" type="file" accept="application/json" style="display:none" onchange="handleImportFile(event)">

        <!-- 리스트 섹션 -->
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 id="section-title" class="font-bold flex items-center gap-2 text-slate-200">
                <i class="fa-solid fa-sun text-purple-400"></i> 일간 체크리스트
            </h2>
            <button onclick="toggleModal(true)" class="text-sm font-medium text-purple-400 hover:text-purple-300">
                <i class="fa-solid fa-plus"></i> 추가
            </button>
        </div>

        <div id="task-list" class="space-y-3"></div>
    </div>

    <!-- 축하 토스트 -->
    <div id="celebration-toast" style="position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(1rem); opacity:0; transition: opacity 0.4s ease, transform 0.4s ease; pointer-events:none; z-index:100;" class="bg-gradient-to-r from-purple-600 to-cyan-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-lg whitespace-nowrap">
        🎉 이상관리국 임무 완료!
    </div>

    <!-- 추가 모달 -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="glass w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">새로운 일과 추가</h3>
            <input type="text" id="new-task-input" placeholder="어떤 일을 추가할까? 코코!"
                onkeydown="if(event.key==='Enter') addTask()"
                class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4">
            <p class="text-slate-500 text-xs mb-2 font-medium">타입 선택</p>
            <div class="flex gap-2 mb-6">
                <button id="type-daily"  onclick="selectType('daily')"  class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-purple-600 text-white">
                    <i class="fa-solid fa-sun mr-1"></i> 일간
                </button>
                <button id="type-weekly" onclick="selectType('weekly')" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-slate-700 text-slate-300">
                    <i class="fa-solid fa-calendar-week mr-1"></i> 주간
                </button>
                <button id="type-fixed"  onclick="selectType('fixed')"  class="flex-1 py-2 rounded-xl text-sm font-bold transition-all bg-slate-700 text-slate-300">
                    <i class="fa-solid fa-thumbtack mr-1"></i> 고정
                </button>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleModal(false)" class="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl font-bold">취소</button>
                <button onclick="addTask()" class="flex-1 py-3 bg-gradient-to-r from-purple-600 to-cyan-600 text-white rounded-xl font-bold">추가하기</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'nte_tasks_v2';
        let tasks = [];
        let currentTab = 'daily';
        let bgVisible = localStorage.getItem('nte_bg') !== 'off';

        function toggleBg() {
            bgVisible = !bgVisible;
            document.getElementById('bg-image-overlay').style.opacity = bgVisible ? '1' : '0';
            document.getElementById('bg-toggle-btn').classList.toggle('bg-on', bgVisible);
            localStorage.setItem('nte_bg', bgVisible ? 'on' : 'off');
        }
        let selectedType = 'daily';
        let lastDailyReset = '';
        let lastWeeklyReset = '';
        let completionShown = { daily: false, weekly: false, fixed: false };
        const clickTimers = {};
        let draggedTaskId = null;
        let deferredPrompt = null;
        let alarmWorker = null;
        let alarmSchedule = null;

        const defaultTasks = [
            { id: 1, name: '회의 준비', done: false, type: 'daily', order: 0 },
            { id: 2, name: '이메일 확인', done: false, type: 'daily', order: 1 },
            { id: 3, name: '장기 목표 검토', done: true, type: 'fixed', order: 0 }
        ];

        function normalizeTaskOrder(taskList) {
            const counter = { daily: 0, weekly: 0, fixed: 0 };
            return taskList.map(task => ({
                ...task,
                order: typeof task.order === 'number' ? task.order : counter[task.type]++
            }));
        }

        // ISO 주 키 (월요일 기준)
        function getWeekKey() {
            const now = new Date();
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
        }

        function init() {
            // 배경 이미지 초기 상태 적용
            document.getElementById('bg-image-overlay').style.opacity = bgVisible ? '1' : '0';
            document.getElementById('bg-toggle-btn').classList.toggle('bg-on', bgVisible);

            stopCountdownTimer(); // 기존 타이머 정지

            const saved = localStorage.getItem(STORAGE_KEY);
            const today = new Date().toLocaleDateString('ko-KR');
            const weekKey = getWeekKey();
            document.getElementById('current-date').innerText = today;

            if (saved) {
                const data = JSON.parse(saved);
                tasks = normalizeTaskOrder(data.tasks || []);
                alarmSchedule = data.alarmSchedule || null;
                lastDailyReset  = data.lastDailyReset  || today;
                lastWeeklyReset = data.lastWeeklyReset || weekKey;

                // 일간 자동 리셋 (날짜 변경 시)
                if (lastDailyReset !== today) {
                    tasks = tasks.map(t => t.type === 'daily' ? { ...t, done: false } : t);
                    lastDailyReset = today;
                }
                // 주간 자동 리셋 (주 변경 시 — 매주 월요일)
                if (lastWeeklyReset !== weekKey) {
                    tasks = tasks.map(t => t.type === 'weekly' ? { ...t, done: false } : t);
                    lastWeeklyReset = weekKey;
                }
            } else {
                tasks = [...defaultTasks];
                lastDailyReset  = today;
                lastWeeklyReset = weekKey;
            }
            tasks = normalizeTaskOrder(tasks);
            // 초기 로드 시 이미 완료 상태면 축하 효과 표시 안 함
            ['daily', 'weekly', 'fixed'].forEach(tab => {
                const tabTasks = tasks.filter(t => t.type === tab);
                completionShown[tab] = tabTasks.length > 0 && tabTasks.every(t => t.done);
            });
            const taskList = document.getElementById('task-list');
            taskList.addEventListener('dragover', handleDragOver);
            taskList.addEventListener('drop', handleListDrop);
            initAlarmWorker();
            registerServiceWorker();
            if (alarmSchedule) {
                scheduleAlarmWorker();
                scheduleAlarmServiceWorker();
            }
            saveData();
            render();
            updateAlarmStatus();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                tasks,
                lastDailyReset,
                lastWeeklyReset,
                alarmSchedule
            }));
        }

        function exportData() {
            const payload = {
                tasks,
                lastDailyReset,
                lastWeeklyReset,
                alarmSchedule,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tasks-export.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData() {
            document.getElementById('import-file').click();
        }

        function handleImportFile(event) {
            const file = event.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    if (!Array.isArray(data.tasks)) {
                        throw new Error('올바르지 않은 데이터 형식입니다.');
                    }
                    tasks = data.tasks.map(t => ({
                        id: Number(t.id) || Date.now(),
                        name: String(t.name || ''),
                        done: Boolean(t.done),
                        type: ['daily', 'weekly', 'fixed'].includes(t.type) ? t.type : 'daily',
                        order: Number.isFinite(t.order) ? t.order : 0
                    }));
                    lastDailyReset = data.lastDailyReset || new Date().toLocaleDateString('ko-KR');
                    lastWeeklyReset = data.lastWeeklyReset || getWeekKey();
                    alarmSchedule = data.alarmSchedule || null;
                    tasks = normalizeTaskOrder(tasks);
                    saveData();
                    render();
                    updateAlarmStatus();
                    if (alarmSchedule) scheduleAlarmWorker();
                    alert('데이터를 성공적으로 가져왔습니다.');
                } catch (error) {
                    alert('데이터 가져오기 중 오류가 발생했습니다. 올바른 JSON 파일인지 확인하세요.');
                    console.error(error);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function promptInstall() {
            if (!deferredPrompt) {
                alert('이 브라우저에서는 설치 기능을 사용할 수 없습니다. 브라우저 메뉴에서 "앱 설치" 또는 "바탕 화면에 추가"를 찾아보세요.');
                return;
            }
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(choice => {
                if (choice.outcome === 'accepted') {
                    console.log('사용자가 설치를 수락했습니다.');
                }
                deferredPrompt = null;
                document.getElementById('install-btn').classList.add('hidden');
            });
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    // 페이지 로드 시 저장된 알람 설정을 서비스 워커로 전달
                    if (alarmSchedule && navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({ type: 'set', time: alarmSchedule });
                    }
                    // 서비스 워커로부터의 메시지 수신
                    navigator.serviceWorker.addEventListener('message', event => {
                        if (event.data?.type === 'alarm') {
                            showAlarmNotification(event.data.label || '설정된 시간');
                        }
                    });
                }).catch(err => {
                    console.warn('서비스 워커 등록 실패', err);
                });
            }
        }

        function initAlarmWorker() {
            if (!window.Worker) return;
            try {
                alarmWorker = new Worker('alarm-worker.js');
                alarmWorker.onmessage = event => {
                    if (event.data?.type === 'alarm') {
                        showAlarmNotification(event.data.label || '설정된 시간');
                    }
                };
            } catch (error) {
                console.warn('알람 워커 로드 실패', error);
            }
        }

        function scheduleAlarmWorker() {
            if (!alarmWorker || !alarmSchedule) return;
            alarmWorker.postMessage({ type: 'set', time: alarmSchedule });
        }

        function updateAlarmStatus() {
            const label = document.getElementById('alarm-status');
            if (alarmSchedule) {
                label.innerText = `알람 설정됨: ${String(alarmSchedule.hour).padStart(2, '0')}:${String(alarmSchedule.minute).padStart(2, '0')}`;
                document.getElementById('alarm-time').value = `${String(alarmSchedule.hour).padStart(2, '0')}:${String(alarmSchedule.minute).padStart(2, '0')}`;
            } else {
                label.innerText = '알람이 설정되지 않았습니다.';
                document.getElementById('alarm-time').value = '';
            }
        }

        function setAlarm() {
            const input = document.getElementById('alarm-time');
            if (!input.value) return;
            const [hour, minute] = input.value.split(':').map(Number);
            if (Number.isNaN(hour) || Number.isNaN(minute)) return;
            alarmSchedule = { hour, minute, label: `${input.value}` };
            scheduleAlarmWorker();
            scheduleAlarmServiceWorker();
            updateAlarmStatus();
            requestNotificationPermission();
            saveData();
        }

        function cancelAlarm() {
            if (!alarmWorker) return;
            alarmWorker.postMessage({ type: 'cancel' });
            cancelAlarmServiceWorker();
            alarmSchedule = null;
            updateAlarmStatus();
            saveData();
        }

        function scheduleAlarmServiceWorker() {
            if (!alarmSchedule || !navigator.serviceWorker.controller) return;
            navigator.serviceWorker.controller.postMessage({ type: 'set', time: alarmSchedule });
        }

        function cancelAlarmServiceWorker() {
            if (!navigator.serviceWorker.controller) return;
            navigator.serviceWorker.controller.postMessage({ type: 'cancel' });
        }

        function requestNotificationPermission() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'default') {
                Notification.requestPermission().catch(() => {});
            }
        }

        function showAlarmNotification(timeText) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('NTE 알람', {
                    body: `${timeText}에 알림이 도착했습니다.`,
                });
            }
            playAlarmSound();
            const toast = document.getElementById('celebration-toast');
            const oldText = toast.innerText;
            toast.innerText = `⏰ 알람: ${timeText}`;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(1rem)';
                toast.innerText = oldText;
            }, 3500);
        }

        function playAlarmSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime);
                gain.gain.setValueAtTime(0.1, context.currentTime);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.3);
            } catch (error) {
                console.warn('알람 소리 재생 실패', error);
            }
        }

        function switchTab(tab) {
            stopCountdownTimer(); // 이전 타이머 정지
            currentTab = tab;
            const activeClass = { daily: 'tab-daily', weekly: 'tab-weekly', fixed: 'tab-fixed' };
            ['daily', 'weekly', 'fixed'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = `tab-btn ${t === tab ? activeClass[t] : 'tab-inactive'}`;
            });
            const titles  = { daily: '일간 체크리스트', weekly: '주간 체크리스트', fixed: '고정 체크리스트' };
            const labels  = { daily: '오늘의 달성도',   weekly: '이번 주 달성도',  fixed: '고정 달성도' };
            const icons   = { daily: 'fa-sun text-purple-400', weekly: 'fa-calendar-week text-emerald-400', fixed: 'fa-thumbtack text-amber-400' };
            const barGrad = {
                daily:  'bg-gradient-to-r from-purple-500 to-cyan-500',
                weekly: 'bg-gradient-to-r from-emerald-500 to-cyan-500',
                fixed:  'bg-gradient-to-r from-amber-500 to-orange-500'
            };
            document.getElementById('section-title').innerHTML =
                `<i class="fa-solid ${icons[tab]}"></i> ${titles[tab]}`;
            document.getElementById('progress-label').innerText = labels[tab];
            const fill = document.getElementById('progress-fill');
            fill.className = `progress-bar h-full w-0 ${barGrad[tab]}`;
            render();
        }

        function selectType(type) {
            selectedType = type;
            const activeColors = { daily: 'bg-purple-600 text-white', weekly: 'bg-emerald-600 text-white', fixed: 'bg-amber-600 text-white' };
            ['daily', 'weekly', 'fixed'].forEach(t => {
                const btn = document.getElementById(`type-${t}`);
                btn.className = `flex-1 py-2 rounded-xl text-sm font-bold transition-all ${t === type ? activeColors[t] : 'bg-slate-700 text-slate-300'}`;
            });
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
            saveData();
            render();
        }

        function addTask() {
            const input = document.getElementById('new-task-input');
            if (!input.value.trim()) return;
            const nextOrder = Math.max(-1, ...tasks.filter(t => t.type === selectedType).map(t => t.order)) + 1;
            tasks.push({ id: Date.now(), name: input.value.trim(), done: false, type: selectedType, order: nextOrder });
            input.value = '';
            toggleModal(false);
            saveData();
            switchTab(selectedType);
        }

        function deleteTask(id, event) {
            event.stopPropagation();
            if (!confirm('이 항목을 삭제할까요?')) return;
            tasks = tasks.filter(t => t.id !== id);
            saveData();
            render();
        }

        function resetTasks() {
            const labels = { daily: '오늘 일간', weekly: '이번 주 주간', fixed: '고정' };
            if (confirm(`${labels[currentTab]} 항목을 모두 미완료 상태로 초기화할까요?`)) {
                tasks = tasks.map(t => t.type === currentTab ? { ...t, done: false } : t);
                saveData();
                render();
            }
        }

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
            if (show) {
                selectType(currentTab);
                setTimeout(() => document.getElementById('new-task-input').focus(), 50);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            const filtered = tasks.filter(t => t.type === currentTab)
                .sort((a, b) => a.order - b.order);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center text-slate-500 py-12">
                        <i class="fa-solid fa-inbox text-3xl mb-3 block opacity-40"></i>
                        <p>아직 항목이 없습니다</p>
                        <p class="text-xs mt-1 opacity-60">+ 추가 버튼으로 새 항목을 만들어보세요</p>
                    </div>`;
            } else {
                const hoverColors = { daily: 'hover:border-purple-500/50', weekly: 'hover:border-emerald-500/50', fixed: 'hover:border-amber-500/50' };
                const checkColors = { daily: 'text-cyan-400', weekly: 'text-emerald-400', fixed: 'text-amber-400' };
                const activeTasks = filtered.filter(t => !t.done);
                const completedTasks = filtered.filter(t => t.done);
                const renderTaskCard = task => {
                    const item = document.createElement('div');
                    item.className = `glass flex items-center justify-between p-4 rounded-2xl cursor-grab ${hoverColors[task.type]} transition-all ${task.done ? 'checked' : ''}`;
                    item.dataset.id = task.id;
                    item.draggable = true;
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <button type="button" class="toggle-btn text-left text-slate-200 focus:outline-none">
                                <i class="${task.done ? `fa-solid fa-circle-check ${checkColors[task.type]}` : 'fa-regular fa-circle'} text-xl"></i>
                            </button>
                            <span class="font-medium task-name cursor-text" title="편집 버튼으로 이름을 변경할 수 있습니다">${escapeHtml(task.name)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" onclick="startEdit(${task.id}, event)" class="text-slate-400 hover:text-cyan-300 p-1 transition-colors" title="이름 수정">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button type="button" onclick="deleteTask(${task.id}, event)" class="text-slate-500 hover:text-red-400 p-1 transition-colors" title="삭제">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    item.querySelector('.toggle-btn').addEventListener('click', event => {
                        event.stopPropagation();
                        toggleTask(task.id);
                    });
                    item.addEventListener('dragstart', event => {
                        draggedTaskId = String(task.id);
                        event.dataTransfer.effectAllowed = 'move';
                        item.classList.add('opacity-40');
                    });
                    item.addEventListener('dragover', event => event.preventDefault());
                    item.addEventListener('drop', event => {
                        event.preventDefault();
                        event.stopPropagation();
                        const targetId = item.dataset.id;
                        if (draggedTaskId && draggedTaskId !== targetId) {
                            moveTaskOrder(draggedTaskId, targetId);
                        }
                    });
                    item.addEventListener('dragend', () => {
                        draggedTaskId = null;
                        item.classList.remove('opacity-40');
                    });
                    return item;
                };

                let doneCount = completedTasks.length;

                if (activeTasks.length > 0) {
                    activeTasks.forEach(task => {
                        list.appendChild(renderTaskCard(task));
                    });
                }

                if (completedTasks.length > 0) {
                    const completedHeader = document.createElement('div');
                    completedHeader.className = 'flex items-center justify-between gap-2 mt-4 mb-2 text-slate-300';
                    completedHeader.innerHTML = `
                        <span class="font-bold">완료된 항목</span>
                        <span class="text-xs text-slate-500">체크 해제하면 다시 이동합니다</span>
                    `;
                    list.appendChild(completedHeader);
                    completedTasks.forEach(task => {
                        list.appendChild(renderTaskCard(task));
                    });
                }

                const total = filtered.length;
                const percent = Math.round((doneCount / total) * 100);
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-fill').style.width = `${percent}%`;
                document.getElementById('task-count').innerText = `${doneCount} / ${total}`;
                document.getElementById('reset-info').innerHTML = getResetInfo();
                startCountdownTimer(); // 카운트다운 타이머 시작
                if (percent === 100 && total > 0) {
                    if (!completionShown[currentTab]) {
                        completionShown[currentTab] = true;
                        showCelebration();
                    }
                } else {
                    completionShown[currentTab] = false;
                }
                return;
            }

            document.getElementById('progress-percent').innerText = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('task-count').innerText = '0 / 0';
            document.getElementById('reset-info').innerHTML = getResetInfo();
            startCountdownTimer(); // 카운트다운 타이머 시작
        }

        let countdownTimer = null;

        function getResetInfo() {
            const dailyReset = getNextDailyReset();
            const weeklyReset = getNextWeeklyReset();
            if (currentTab === 'daily') {
                return `매일 05:00 자동 초기화 · 다음: ${formatNextReset(dailyReset)} · <span id="countdown-daily" class="countdown-display"></span>`;
            }
            if (currentTab === 'weekly') {
                return `매주 월요일 05:00 자동 초기화 · 다음: ${formatNextReset(weeklyReset)} · <span id="countdown-weekly" class="countdown-display"></span>`;
            }
            return '수동 초기화만 가능';
        }

        function getNextDailyReset() {
            const next = new Date();
            next.setHours(5, 0, 0, 0);
            // 만약 현재 시간이 이미 05:00을 지났다면, 내일 05:00으로 설정
            if (next <= new Date()) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function getNextWeeklyReset() {
            const next = new Date();
            next.setHours(5, 0, 0, 0);
            const day = next.getDay();
            // 월요일(1) 05:00까지 남은 일수 계산
            const daysUntilMonday = ((1 - day + 7) % 7);
            
            if (daysUntilMonday === 0 && next <= new Date()) {
                // 이미 이번 주 월요일 05:00을 지났으면 다음주 월요일
                next.setDate(next.getDate() + 7);
            } else if (daysUntilMonday > 0) {
                next.setDate(next.getDate() + daysUntilMonday);
            }
            return next;
        }

        function formatNextReset(date) {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return `${date.getMonth() + 1}월 ${date.getDate()}일(${days[date.getDay()]}) ${String(date.getHours()).padStart(2, '0')}:00`;
        }

        function formatCountdown(ms) {
            if (ms <= 0) return '초기화 중...';
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (hours > 0) {
                return `${hours}시간 ${String(minutes).padStart(2, '0')}분 ${String(seconds).padStart(2, '0')}초`;
            } else {
                return `${String(minutes).padStart(2, '0')}분 ${String(seconds).padStart(2, '0')}초`;
            }
        }

        function updateCountdown() {
            const dailyReset = getNextDailyReset();
            const weeklyReset = getNextWeeklyReset();
            const now = new Date();

            const dailyMs = dailyReset - now;
            const weeklyMs = weeklyReset - now;

            const dailyElement = document.getElementById('countdown-daily');
            const weeklyElement = document.getElementById('countdown-weekly');

            if (dailyElement) {
                dailyElement.textContent = formatCountdown(dailyMs);
                if (dailyMs < 3600000 && dailyMs > 0) {
                    dailyElement.classList.add('countdown-alert');
                } else {
                    dailyElement.classList.remove('countdown-alert');
                }
            }
            if (weeklyElement) {
                weeklyElement.textContent = formatCountdown(weeklyMs);
                if (weeklyMs < 3600000 && weeklyMs > 0) {
                    weeklyElement.classList.add('countdown-alert');
                } else {
                    weeklyElement.classList.remove('countdown-alert');
                }
            }
        }

        function startCountdownTimer() {
            if (countdownTimer) clearInterval(countdownTimer);
            updateCountdown(); // 초기 업데이트
            countdownTimer = setInterval(updateCountdown, 1000);
        }

        function stopCountdownTimer() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function editTask(id, event) {
            if (event) event.stopPropagation();
            startEdit(id);
        }

        function moveTaskOrder(dragId, dropId) {
            const visibleTasks = tasks.filter(t => t.type === currentTab).sort((a, b) => a.order - b.order);
            const fromIndex = visibleTasks.findIndex(t => String(t.id) === String(dragId));
            const toIndex = visibleTasks.findIndex(t => String(t.id) === String(dropId));
            if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) return;
            const [moved] = visibleTasks.splice(fromIndex, 1);
            visibleTasks.splice(toIndex, 0, moved);
            visibleTasks.forEach((task, index) => {
                const original = tasks.find(t => t.id === task.id);
                if (original) original.order = index;
            });
            saveData();
            render();
        }

        function moveTaskToEnd(dragId) {
            const visibleTasks = tasks.filter(t => t.type === currentTab).sort((a, b) => a.order - b.order);
            const fromIndex = visibleTasks.findIndex(t => String(t.id) === String(dragId));
            if (fromIndex === -1) return;
            const [moved] = visibleTasks.splice(fromIndex, 1);
            visibleTasks.push(moved);
            visibleTasks.forEach((task, index) => {
                const original = tasks.find(t => t.id === task.id);
                if (original) original.order = index;
            });
            saveData();
            render();
        }

        function handleDragOver(event) {
            event.preventDefault();
        }

        function handleListDrop(event) {
            event.preventDefault();
            const targetItem = event.target.closest('[data-id]');
            if (!targetItem && draggedTaskId) {
                moveTaskToEnd(draggedTaskId);
            }
        }

        function startEdit(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const item = Array.from(document.querySelectorAll('#task-list [data-id]'))
                .find(el => el.dataset.id == id);
            if (!item) return;
            const span = item.querySelector('.task-name');
            if (!span) return;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = task.name;
            input.className = 'bg-transparent outline-none border-b border-purple-400 text-white font-medium flex-1 min-w-0';
            item.onclick = null;
            span.replaceWith(input);
            input.focus();
            input.select();

            let saved = false;
            function save() {
                if (saved) return;
                saved = true;
                const newName = input.value.trim();
                if (newName && newName !== task.name) {
                    tasks = tasks.map(t => t.id === id ? { ...t, name: newName } : t);
                    saveData();
                }
                render();
            }
            function cancel() {
                if (saved) return;
                saved = true;
                render();
            }
            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); input.removeEventListener('blur', save); save(); }
                if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', save); cancel(); }
            });
        }

        function showCelebration() {
            const toast = document.getElementById('celebration-toast');
            clearTimeout(toast._hideTimer);
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast._hideTimer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(1rem)';
            }, 2500);
        }

        window.addEventListener('beforeinstallprompt', event => {
            event.preventDefault();
            deferredPrompt = event;
            const installButton = document.getElementById('install-btn');
            if (installButton) installButton.classList.remove('hidden');
        });

        window.addEventListener('appinstalled', () => {
            const installButton = document.getElementById('install-btn');
            if (installButton) installButton.classList.add('hidden');
        });

        window.addEventListener('beforeunload', () => {
            stopCountdownTimer();
        });

        init();
    </script>
</body>
</html>
